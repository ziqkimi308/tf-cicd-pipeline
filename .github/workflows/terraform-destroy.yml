on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type DESTROY to confirm teardown"
        required: true
        type: string

env:
  TF_VERSION: "1.8.0"
  AWS_REGION: "ap-southeast-1"

jobs:
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Validate confirmation input
        if: ${{ github.event.inputs.confirm != 'DESTROY' }}
        run: |
          echo "ERROR: You must type DESTROY to confirm. Got: ${{ github.event.inputs.confirm }}"
          exit 1

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: |
          terraform destroy \
            -var="alert_email=${{ secrets.ALERT_EMAIL }}" \
            -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}" \
            -auto-approve

      - name: Confirm Destroy Complete
        run: echo "All resources destroyed successfully"
